name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            nuitka-args: --windows-console-mode=disable
            artifact-dir: dist/main.dist
            flet-artifact: flet-windows.zip
            extract-cmd: unzip -q flet_archive -d flet_client && rm flet_archive

          - os: macos-latest
            label: macOS
            nuitka-args: --macos-create-app-bundle
            artifact-dir: dist/main.app
            flet-artifact: flet-macos.tar.gz
            extract-cmd: tar -xzf flet_archive -C flet_client && rm flet_archive

          - os: ubuntu-latest
            label: Linux
            nuitka-args: ""
            artifact-dir: dist/main.dist
            flet-artifact: flet-linux-ubuntu24.04-amd64.tar.gz
            extract-cmd: tar -xzf flet_archive -C flet_client && rm flet_archive

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc python3-dev tk-dev libx11-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: |
          brew install python-tk@3.12 || true

      - name: Install dependencies
        run: pip install httpx "flet[desktop]" playsound3 python-dotenv nuitka

      - name: Bundle Flet desktop client
        shell: bash
        run: |
          FLET_VERSION=$(python -c "import flet_desktop; print(flet_desktop.version.version)")
          FLET_URL="https://github.com/flet-dev/flet/releases/download/v${FLET_VERSION}/${{ matrix.flet-artifact }}"
          echo "Downloading Flet client v${FLET_VERSION}: ${{ matrix.flet-artifact }}"
          curl -fsSL -o flet_archive "$FLET_URL"
          mkdir -p flet_client
          ${{ matrix.extract-cmd }}

      - name: Build with Nuitka
        shell: bash
        run: |
          python -m nuitka --standalone \
            --enable-plugin=tk-inter \
            --include-package=gui,httpx,playsound3,dotenv,flet,flet_desktop \
            --include-package-data=flet \
            --include-data-dir=gui=gui \
            --include-data-dir=flet_client=flet_client \
            --output-dir=dist \
            --output-filename=ATRI-IndexTTS \
            ${{ matrix.nuitka-args }} \
            --assume-yes-for-downloads \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ATRI-IndexTTS-${{ matrix.label }}
          path: ${{ matrix.artifact-dir }}
