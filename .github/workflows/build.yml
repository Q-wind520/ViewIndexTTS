name: Build

on:
  push:
    tags:
      - "[0-9]*"
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            nuitka-args: --windows-console-mode=disable
            flet-artifact: flet-windows.zip
            extract-cmd: unzip -q flet_archive -d flet_client && rm flet_archive
            flet-data-dir: --include-data-dir=flet_client=flet_client

          - os: macos-latest
            label: macOS
            nuitka-args: --macos-create-app-bundle
            flet-artifact: flet-macos.tar.gz
            extract-cmd: tar -xzf flet_archive -C flet_client && rm flet_archive
            flet-data-dir: ""

          - os: ubuntu-latest
            label: Linux
            nuitka-args: ""
            flet-artifact: flet-linux-ubuntu24.04-amd64.tar.gz
            extract-cmd: tar -xzf flet_archive -C flet_client && rm flet_archive
            flet-data-dir: --include-data-dir=flet_client=flet_client

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          echo "VERSION=${VER#v}" >> $GITHUB_ENV

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc python3-dev tk-dev libx11-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: |
          brew install python-tk@3.12 || true

      - name: Install dependencies
        run: pip install httpx "flet[desktop]" playsound3 python-dotenv nuitka

      - name: Bundle Flet desktop client
        shell: bash
        run: |
          FLET_VERSION=$(python -c "import flet_desktop; print(flet_desktop.version.version)")
          FLET_URL="https://github.com/flet-dev/flet/releases/download/v${FLET_VERSION}/${{ matrix.flet-artifact }}"
          echo "Downloading Flet client v${FLET_VERSION}: ${{ matrix.flet-artifact }}"
          curl -fsSL -o flet_archive "$FLET_URL"
          mkdir -p flet_client
          ${{ matrix.extract-cmd }}

      - name: Build with Nuitka
        shell: bash
        run: |
          python -m nuitka --standalone \
            --enable-plugin=tk-inter \
            --include-package=gui,httpx,playsound3,dotenv,flet,flet_desktop \
            --include-package-data=flet \
            --include-data-dir=gui=gui \
            ${{ matrix.flet-data-dir }} \
            --output-dir=dist \
            --output-filename=ViewIndexTTS \
            ${{ matrix.nuitka-args }} \
            --assume-yes-for-downloads \
            main.py

      # ── macOS: place Flet.app alongside main.app ──

      - name: Copy Flet.app alongside main.app (macOS)
        if: runner.os == 'macOS'
        run: cp -R flet_client/Flet.app dist/Flet.app

      # ── Windows: Inno Setup 6 installer ──

      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: choco install innosetup -y --no-progress

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          "C:/Program Files (x86)/Inno Setup 6/ISCC.exe" \
            /DMyAppVersion="${VERSION}" \
            installer/windows/setup.iss

      # ── macOS: DMG ──

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dmg_staging
          cp -R dist/main.app dmg_staging/
          cp -R dist/Flet.app dmg_staging/
          hdiutil create \
            -volname ViewIndexTTS \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            "dist/ViewIndexTTS-${VERSION}.dmg"

      # ── Upload artifacts ──

      - name: Upload portable (Windows / Linux)
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ViewIndexTTS-${{ matrix.label }}-Portable
          path: dist/main.dist

      - name: Upload portable (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ViewIndexTTS-${{ matrix.label }}-Portable
          path: |
            dist/main.app
            dist/Flet.app

      - name: Upload installer (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ViewIndexTTS-${{ matrix.label }}-Setup
          path: dist/ViewIndexTTS-Setup-*.exe

      - name: Upload DMG (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ViewIndexTTS-${{ matrix.label }}-DMG
          path: dist/ViewIndexTTS-*.dmg
